repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.lock\.yml$
      - id: end-of-file-fixer
        exclude: \.lock\.yml$
      - id: check-yaml
        exclude: ^charts/.*/templates/.*\.yaml$
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-docstring-first
      - id: debug-statements

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 87928e6d6761a4a6d22250e1fee5601b3998086e  # frozen: 26.5.1
    hooks:
      - id: black
        language_version: python3

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Linting
  - repo: https://github.com/pycqa/flake8
    rev: d93590f5be797aabb60e3b09f2f52dddb02f349f  # frozen: 7.3.0
    hooks:
      - id: flake8
        args: ["--max-line-length=88", "--extend-ignore=E203,W503"]

  # Typo checking
  - repo: https://github.com/crate-ci/typos
    rev: 3e8e1dbf18c56a9ed625484ca941497c73e7da2c  # frozen: v1.47.2
    hooks:
      - id: typos
