name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        Before opening a new bug report, please [search existing issues](https://github.com/llm-d-incubation/llm-d-fast-model-actuation/issues)
        to check if a similar bug has already been reported.
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: If you are filing this on behalf of someone else, how can we reach them?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of our software are you running?
      options:
        - main (please specify commit below)
        - non-main branch (please specify below)
        - v0.5.1-alpha.6
        - v0.5.1-alpha.5
        - v0.5.1-alpha.4
        - v0.5.1-alpha.3
        - v0.5.1-alpha.2
        - v0.5.1-alpha
        - v0.2.5
        - v0.2.0
        - v0.0.1
      default: 0
    validations:
      required: true
  - type: input
    id: branch
    attributes:
      label: Branch name
      description: If running a non-tagged commit from a branch other than main, please provide the branch name.
      placeholder: ex. fix-bug-x
    validations:
      required: false
  - type: input
    id: commit
    attributes:
      label: Commit SHA
      description: If running from a non-tagged commit, please provide the commit SHA.
      placeholder: ex. abc1234
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please attach log files or paste a short snippet. For lengthy logs, prefer uploading files using the attachment button below.
      render: shell
