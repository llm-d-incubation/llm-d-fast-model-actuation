name: Verify IDL Consumption

on:
  # So we can trigger manually if needed
  workflow_dispatch:

  push:
    paths:
      - ".github/workflows/verify-idl-consumption.yml"
      - Makefile
      - api/**
      - config/crd/**

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pin the code-generation toolchain explicitly so this check is
      # deterministic: the generated code is sensitive to the Go toolchain's
      # formatter, so without pinning it passes or fails depending on which
      # runner-image Go version the job lands on. This is the *tools* version
      # used to generate code, chosen on purpose and specified separately from
      # go.mod's language version; setup-go sets GOTOOLCHAIN=local, so the
      # generators are built with exactly this version. If you bump it, also
      # regenerate the committed code (hack/verify-idl-consumption.sh).
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"

      # Runs the same script the pre-commit `verify-idl-consumption` hook wraps,
      # so the source of truth is shared even though CI invokes it directly.
      - name: Verify
        run: hack/verify-idl-consumption.sh
