name: Verify IDL Consumption

on:
  # So we can trigger manually if needed
  workflow_dispatch:

  push:
    paths:
      - ".github/workflows/verify-idl-consumption.yml"
      - Makefile
      - api/**
      - config/crd/**

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # NOTE: this runs hack/verify-idl-consumption.sh directly (not via
      # pre-commit) and intentionally does not pin Go with actions/setup-go.
      # The generated client code is sensitive to the Go toolchain, and the
      # committed code matches the runner's default Go. This is the same script
      # the pre-commit `verify-idl-consumption` hook runs locally, so the source
      # of truth is shared even though CI invokes it directly.
      - name: Verify
        run: hack/verify-idl-consumption.sh
