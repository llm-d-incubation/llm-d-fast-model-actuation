name: Verify IDL Consumption

on:
  # So we can trigger manually if needed
  workflow_dispatch:

  push:
    paths:
      - ".github/workflows/verify-idl-consumption.yml"
      - Makefile
      - api/**
      - config/crd/**

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pin the Go toolchain explicitly: it is a build dependency for code
      # generation, so pinning keeps CI reproducible (setup-go sets
      # GOTOOLCHAIN=local, so the generators are built with exactly this
      # version). This is the *toolchain* version, distinct from go.mod's
      # language version. We have not observed the generated code differ across
      # current toolchains (1.24–1.26); this is defensive pinning of a
      # dependency, not a fix for an observed bug.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"

      # Runs the same script the pre-commit `verify-idl-consumption` hook wraps,
      # so the source of truth is shared even though CI invokes it directly.
      - name: Verify
        run: hack/verify-idl-consumption.sh
