name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
      - name: Create Python virtualenv
        run: python3 -m venv .venv

      - name: Install pre-commit
        run: .venv/bin/python -m pip install --upgrade pip pre-commit==4.3.0

      - name: go mod tidy + golangci-lint (via pre-commit)
        # pre-commit run accepts a single hook id per invocation. pre-commit
        # builds golangci-lint (pinned in .pre-commit-config.yaml) itself, so
        # there is no separate install step.
        run: |
          .venv/bin/pre-commit run go-mod-tidy --all-files --hook-stage pre-push
          .venv/bin/pre-commit run golangci-lint-full --all-files --hook-stage pre-push
