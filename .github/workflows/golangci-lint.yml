name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.11"

      - name: Install pre-commit and golangci-lint v2.12.2
        run: |
          python -m pip install --upgrade pip pre-commit
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: go mod tidy + golangci-lint (via pre-commit)
        # pre-commit run accepts a single hook id per invocation.
        run: |
          pre-commit run go-mod-tidy --all-files --hook-stage pre-push
          pre-commit run golangci-lint --all-files --hook-stage pre-push
