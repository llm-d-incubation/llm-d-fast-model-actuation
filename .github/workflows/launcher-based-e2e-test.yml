# Tests launcher-based server-providing pods in a `kind` cluster
name: Launcher-Based E2E Test

on:
  # So we can trigger manually if needed
  workflow_dispatch:

  push:
    paths:
      - ".github/workflows/launcher-based-e2e-test.yml"
      - Makefile
      - api/**
      - charts/**
      - cmd/dual-pods-controller/**
      - cmd/launcher-populator/**
      - cmd/test-requester/**
      - config/**
      - '!config/examples/**'
      - dockerfiles/Dockerfile.launcher.cpu
      - go.*
      - inference_server/launcher/**
      - pkg/**
      - scripts/*
      - test/e2e/**
      - '!test/e2e/*.md'
      - '!test/e2e/demo-fma-hpa/**'

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/launcher-based-e2e-test.yml"
      - Makefile
      - api/**
      - charts/**
      - cmd/dual-pods-controller/**
      - cmd/launcher-populator/**
      - cmd/test-requester/**
      - config/**
      - '!config/examples/**'
      - dockerfiles/Dockerfile.launcher.cpu
      - go.*
      - inference_server/launcher/**
      - pkg/**
      - scripts/*
      - test/e2e/**
      - '!test/e2e/*.md'
      - '!test/e2e/demo-fma-hpa/**'

jobs:
  debug:
    name: print relevant info
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "github.actor=${{ github.actor }}"
          echo "github.action_ref=${{ github.action_ref }}"
          echo "github.event_name=${{ github.event_name }}"
          echo "github.head_ref=$GITHUB_HEAD_REF"
          echo "github.ref=${{ github.ref }}"
          echo "github.ref_name=${{ github.ref_name }}"
          echo "github.repository=${{ github.repository }}"
          echo "github.repository_owner=${{ github.repository_owner }}"
          echo "github.triggering_actor=${{ github.triggering_actor }}"
          echo "GITHUB_ACTION_REF=$GITHUB_ACTION_REF"

  run-launcher-test:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Install ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
        with:
          version: v0.15.2

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Run launcher-based E2E test
        run: test/e2e/run-launcher-based.sh

      - name: list all pods
        if: always()
        run: kubectl get pods -A -o wide

      - name: list test pods with labels
        if: always()
        run: kubectl get pods -L dual-pods.llm-d.ai/dual,dual-pods.llm-d.ai/sleeping,dual-pods.llm-d.ai/instance,dual-pods.llm-d.ai/launcher-config-name

      - name: list ReplicaSets
        if: always()
        run: kubectl get rs -A

      - name: Dump previous log of first dual-pods controller
        if: always()
        run: |
          if [ -r dual-pods-controller-first-prev.log ]
          then cat dual-pods-controller-first-prev.log
          else echo The first dual-pods controller ran at most once
          fi

      - name: Dump log of first dual-pods controller
        if: always()
        run: |
          if [ -r dual-pods-controller-first.log ]
          then cat dual-pods-controller-first.log
          else echo The first dual-pods controller left no log
          fi

      - name: dump dual-pods controller log
        if: always()
        run: kubectl logs deploy/fma-dual-pods-controller

      - name: dump launcher-populator log
        if: always()
        run: kubectl logs deploy/fma-launcher-populator || echo "launcher-populator not deployed"

      - name: dump GPU allocations
        if: always()
        run: kubectl get cm gpu-allocs -o yaml

      - name: dump GPU map
        if: always()
        run: kubectl get cm gpu-map -o yaml

      - name: dump InferenceServerConfigs
        if: always()
        run: kubectl get inferenceserverconfigs -o yaml

      - name: dump LauncherConfigs
        if: always()
        run: kubectl get launcherconfigs -o yaml

      - name: dump YAML of test pods
        if: always()
        run: kubectl get pods -o yaml

      - name: dump launcher pod logs
        if: always()
        run: |
          for pod in $(kubectl get pods -l dual-pods.llm-d.ai/launcher-config-name -o name); do
            echo "=== Logs for $pod ==="
            kubectl logs $pod || echo "Failed to get logs for $pod"
          done

      - name: dump vLLM instance logs from launchers
        if: always()
        run: scripts/dump-launcher-vllm-logs.sh

      - name: dump scrape of first dual-pods controller
        if: always()
        run: cat scrape1.metrics || true

      - name: dump scrape of final dual-pods controller
        if: always()
        run: cat scrape2.metrics || true

      - name: upload Prometheus snapshot
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snap
          path: snaps
          retention-days: 14
