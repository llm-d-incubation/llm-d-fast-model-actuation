name: python-code-quality
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.11"

      - name: Cache pip dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install pre-commit and pytest dependencies
        run: |
          python -m pip install --upgrade pip
          # pre-commit is the single source of truth for lint/format/file checks
          pip install pre-commit
          # pytest and its dependencies (tests are run separately, not via pre-commit)
          pip install pytest==9.0.2 -r inference_server/launcher/requirements-sans-vllm.txt

      - name: Run pre-commit (lint, format, file and typo checks)
        # Go/codegen hooks require a Go toolchain and run in their own workflows.
        env:
          SKIP: go-mod-tidy,golangci-lint,verify-idl-consumption
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run pytest launcher
        run: |
          cd inference_server/launcher
          python -m pytest tests/test_launcher.py -v
          python -m pytest tests/test_gputranslator.py -v

      - name: Summary
        if: always()
        run: |
          echo "Code quality checks completed!"
          echo "If any checks failed, run pre-commit locally to fix issues:"
          echo "  pre-commit run --all-files"
          echo "  python -m pytest tests/test_launcher.py -v"
          echo "  python -m pytest tests/test_gputranslator.py -v"
